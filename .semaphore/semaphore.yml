version: v1.0
name: Test ETModel
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404
blocks:
  - name: RSpec
    task:
      env_vars:
        - name: DATABASE_HOST
          value: localhost
        - name: RAILS_ENV
          value: test
        - name: BUNDLE_JOBS
          value: '4'
        - name: CI
          value: 'true'
      jobs:
        - name: Test
          commands:
            - checkout
            - sem-service start mysql 8
            - sudo apt-get update
            - sudo apt-get install -y libmysqlclient-dev
            - cache restore
            - bundle config set --local deployment 'true'
            - gem update --system
            - bundle install
            - yarn install
            - cache store
            - 'bundle exec rails shakapacker:compile'
            - 'bundle exec rails db:setup'
            - bundle exec rspec --format RspecJunitFormatter --out junit.xml --format progress
      epilogue:
        always:
          commands:
            - test-results publish junit.xml
      secrets:
        - name: ETModel credentials master.key
promotions:
  - name: Deploy to staging
    pipeline_file: deploy_staging.yml
    auto_promote:
      when: result = 'passed' and branch = 'master'
    deployment_target: staging
  - name: Deploy to production
    pipeline_file: deploy_production.yml
    auto_promote:
      when: result = 'passed' and branch = 'production'
    deployment_target: production
  - name: Deploy to stable
    pipeline_file: deploy_stable.yml
    auto_promote:
      when: result = 'passed' and branch = 'auth-again'
